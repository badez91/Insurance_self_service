<!DOCTYPE html>
<html>
<head>
    <style>
        .card-select {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .card-select:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-select.selected {
            border: 2px solid #0d6efd;
            background-color: #f0f8ff;
        }

        input[type="radio"] {
            display: none;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .summary-card {
            background-color: #f8f9fa;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Coverage</title>
</head>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const cards = document.querySelectorAll(".card-select");

        function updateSelected() {
            cards.forEach(c => c.classList.remove("selected"));

            const selected = document.querySelector("input[name='plan']:checked");
            if (selected) {
                selected.closest(".card-select").classList.add("selected");
            }
        }

        cards.forEach(card => {
            card.addEventListener("click", () => {
                const radio = card.querySelector("input");
                radio.checked = true;
                updateSelected();
            });
        });

        updateSelected();
    });
</script>
<body class="container mt-5">

<h2 class="mb-4">Step 2: Choose Plan</h2>

<!-- SUMMARY -->
<div class="card p-3 mb-4 summary-card">
    <h5>Coverage Summary</h5>
    <p><b>Coverage:</b> <span th:text="${coverageType}"></span></p>
    <p><b>Area Of Travel:</b> <span th:text="${areaName}"></span>
        <small class="text-muted d-block" th:text="${areaDesc}"></small></p>
    <p><b>Travel Journey Time:</b>
        <span th:text="${startDate}"></span> →
        <span th:text="${endDate}"></span>
    </p>

    <a href="/" class="btn btn-sm btn-outline-secondary">Edit</a>
</div>

<form action="/customer" method="post">

    <input type="hidden" name="coverageType" th:value="${coverageType}">
    <input type="hidden" name="area" th:value="${areaCode}">
    <input type="hidden" name="startDate" th:value="${startDate}">
    <input type="hidden" name="endDate" th:value="${endDate}">

    <div class="row mb-4">

        <div class="col-md-6">
            <label class="card p-3 shadow card-select">
                <input type="radio" name="plan" value="PLAN_A" checked>
                <h5>Plan A</h5>
                <p>Basic coverage</p>
                <h4 class="text-primary">RM <span th:text="${priceA}"></span></h4>
            </label>
        </div>

        <div class="col-md-6">
            <label class="card p-3 shadow card-select">
                <input type="radio" name="plan" value="PLAN_B">
                <h5>Plan B</h5>
                <p>Premium coverage</p>
                <h4 class="text-primary">RM <span th:text="${priceB}"></span></h4>
            </label>
        </div>

    </div>

    <br>

    <div class="d-flex justify-content-between">
        <button type="button" onclick="history.back()" class="btn btn-secondary">Back</button>
        <button class="btn btn-primary">Next</button>
    </div>

</form>
</body>
</html>
