<!DOCTYPE html>
<html>
<head>
    <style>
        .card-select {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .card-select:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-select.selected {
            border: 2px solid #0d6efd;
            background-color: #f0f8ff;
        }

        input[type="radio"] {
            display: none;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .summary-card {
            background-color: #f8f9fa;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Summary</title>
</head>

<body class="container mt-5">

<h2 class="mb-4">Confirm Application</h2>

<form action="/submit" method="post" class="card p-4 shadow">

    <!-- PASS DATA -->
    <div th:each="entry : ${data}">
        <input type="hidden" th:name="${entry.key}" th:value="${entry.value}">
    </div>

    <!-- PLAN + COVERAGE -->
    <h5>Plan & Coverage</h5>
    <table class="table table-bordered">
        <tr><th>Coverage</th><td th:text="${data.coverageType}"></td></tr>
        <tr><th>Area Of Travel</th><td>
            <span th:text="${areaName}"></span>
            <small class="text-muted d-block" th:text="${areaDesc}"></small>
        </td></tr>
        <tr><th>Plan</th><td th:text="${data.plan}"></td></tr>
        <tr><th>Travel Date</th>
            <td>
                <span th:text="${data.startDate}"></span> →
                <span th:text="${data.endDate}"></span>
            </td>
        </tr>
    </table>

    <!-- CUSTOMER -->
    <h5>Insured Information</h5>
    <table class="table table-bordered">
        <tr><th>Name</th><td th:text="${data.fullName}"></td></tr>
        <tr><th>NRIC</th><td th:text="${data.nric}"></td></tr>
        <tr><th>Email</th><td th:text="${data.email}"></td></tr>
        <tr><th>Mobile</th><td th:text="${data.mobile}"></td></tr>
    </table>

    <!-- TOTAL -->
    <h5>Total</h5>
    <table class="table table-bordered">
        <tr>
            <th>Total Amount</th>
            <td class="text-success">
                <b>RM <span th:text="${data.price}"></span></b>
            </td>
        </tr>
    </table>

    <div class="d-flex justify-content-between">
        <button type="button" onclick="history.back()" class="btn btn-secondary">
            Back
        </button>

        <button class="btn btn-success">
            Submit
        </button>
    </div>

</form>

</body>
</html>
