<!DOCTYPE html>
<html>
<head>
    <style>
        .card-select {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .card-select:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-select.selected {
            border: 2px solid #0d6efd;
            background-color: #f0f8ff;
        }

        input[type="radio"] {
            display: none;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .summary-card {
            background-color: #f8f9fa;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Coverage</title>
</head>
<body class="container mt-5">

<h2 class="mb-4">Step 3: Customer Info</h2>

<div class="card p-3 mb-4 summary-card">
    <h5>Coverage Summary</h5>

    <p><b>Coverage:</b> <span th:text="${coverageType}"></span></p>

    <p><b>Area:</b>
        <span th:text="${areaName}"></span>
        <small class="text-muted d-block" th:text="${areaDesc}"></small>
    </p>

    <p><b>Travel:</b>
        <span th:text="${startDate}"></span> →
        <span th:text="${endDate}"></span>
    </p>

    <p><b>Plan:</b> <span th:text="${plan}"></span></p>
</div>

<form action="/summary" method="post" class="card p-4 shadow">

    <input type="hidden" name="coverageType" th:value="${coverageType}">
    <input type="hidden" name="area" th:value="${areaCode}">
    <input type="hidden" name="plan" th:value="${plan}">
    <input type="hidden" name="startDate" th:value="${startDate}">
    <input type="hidden" name="endDate" th:value="${endDate}">
    <input type="hidden" name="price" th:value="${price}">

    <div class="row">
        <h5 class="section-title">Personal Information</h5>
        <div class="col-md-6 mb-3">
            <input class="form-control" name="fullName" placeholder="Full Name" required>
        </div>
        <div class="col-md-6 mb-3">
            <input class="form-control" name="nric" placeholder="NRIC" required>
        </div>

        <div class="col-md-6 mb-3">
            <input class="form-control" name="email" placeholder="Email" required type="email">
        </div>
        <div class="col-md-6 mb-3">
            <input class="form-control" name="mobile" placeholder="Mobile" required pattern="01[0-9]{7,9}">
        </div>

        <div class="col-md-6 mb-3">
            <input class="form-control" name="address1" placeholder="Address 1" required>
        </div>
        <div class="col-md-6 mb-3">
            <input class="form-control" name="address2" placeholder="Address 2">
        </div>

        <div class="col-md-6 mb-3">
            <input class="form-control" name="postcode" placeholder="Postcode" required>
        </div>
    </div>

    <div class="d-flex justify-content-between">
        <button type="button" onclick="history.back()" class="btn btn-secondary">Back</button>
        <button class="btn btn-primary">Next</button>
    </div>

</form>

</body>
</html>
